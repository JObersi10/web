<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOBERSI | Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; cursor: none; background: black; color: white; overflow-x: hidden; }
        .syne { font-family: 'Syne', sans-serif; }
        #cursor { pointer-events: none; position: fixed; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, background-color 0.3s; }
        .particle { position: absolute; pointer-events: none; will-change: transform, opacity; }
        .nav-blur { backdrop-filter: blur(20px); background: rgba(0, 0, 0, 0.8); }
        .project-card:hover .project-overlay { opacity: 1; }
    </style>
</head>
<body>

    <div id="cursor" class="w-3 h-3 bg-white rounded-full border-2 border-transparent"></div>

    <div class="fixed inset-0 z-0 pointer-events-none">
        <video id="bg-video" autoplay loop muted playsinline class="absolute top-1/2 left-1/2 w-auto min-w-full min-h-full max-w-none -translate-x-1/2 -translate-y-1/2 opacity-20 grayscale">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-flowing-blue-and-purple-smoke-2426-large.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/60"></div>
    </div>

    <div id="particle-container" class="fixed inset-0 pointer-events-none z-[9998] overflow-hidden"></div>

    <nav id="navbar" class="fixed w-full z-[100] transition-all duration-500 py-10">
        <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
            <button onclick="showPage('home')" class="text-3xl font-black italic syne flex items-center gap-3">
                <div class="w-3 h-3 bg-blue-600 rounded-full"></div>
                JO<span class="text-blue-500">BERSI</span>
            </button>
            <div class="hidden md:flex gap-10 font-bold text-[10px] tracking-[0.5em] uppercase text-zinc-500">
                <button onclick="showPage('home')" class="hover:text-white transition-colors">HOME</button>
                <button onclick="showPage('portfolio')" class="hover:text-white transition-colors">PORTFOLIO</button>
                <button onclick="showPage('about')" class="hover:text-white transition-colors">ABOUT</button>
            </div>
        </div>
    </nav>

    <main id="content" class="relative z-10">
        <section id="home" class="page min-h-screen flex flex-col items-center justify-center text-center px-8">
            <h1 class="text-[18vw] font-black leading-[0.8] mb-12 uppercase italic syne">
                JO<br><span class="text-blue-500">BERSI</span>
            </h1>
            <button onclick="showPage('portfolio')" class="px-12 py-6 bg-white text-black font-bold uppercase tracking-widest text-xs rounded-full hover:bg-blue-600 hover:text-white transition-all transform hover:scale-110">
                Access_Archive
            </button>
        </section>

        <section id="portfolio" class="page hidden pt-48 px-8 max-w-7xl mx-auto pb-40">
            <h2 class="text-9xl font-black italic syne uppercase mb-24">Work.</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="portfolio-grid">
                </div>
        </section>

        <section id="about" class="page hidden pt-48 px-8 max-w-7xl mx-auto pb-40">
            <h2 class="text-[15vw] font-black italic leading-[0.75] syne uppercase mb-20">JO<br><span class="text-blue-500">BERSI</span></h2>
            <p class="text-6xl font-light italic text-zinc-300 max-w-5xl">High schooler in <span class="text-white font-black">Curaçao</span>. Visual engineer and hardware experimenter.</p>
        </section>
    </main>

    <script>
        // --- State & Config ---
        let mouseX = 0, mouseY = 0, lastX = 0, lastY = 0;
        let audioCtx = null;
        const cursor = document.getElementById('cursor');
        const particleContainer = document.getElementById('particle-container');

        // --- Audio Logic ---
        function playSound(freq = 330, duration = 0.6) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Particles ---
        function createBurst(x, y) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle w-12 h-[1px] bg-blue-500';
                const angle = (i * 36) + (Math.random() * 15);
                const velocity = 4 + Math.random() * 5;
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                p.style.transform = `rotate(${angle}deg)`;
                
                particleContainer.appendChild(p);
                
                p.animate([
                    { transform: `rotate(${angle}deg) translateX(0px) scale(1)`, opacity: 1 },
                    { transform: `rotate(${angle}deg) translateX(${velocity * 100}px) scale(0)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        // --- Cursor & Scroll ---
        window.addEventListener('mousemove', (e) => {
            lastX = mouseX; lastY = mouseY;
            mouseX = e.clientX; mouseY = e.clientY;
            
            const dx = mouseX - lastX;
            const dy = mouseY - lastY;
            const speed = Math.sqrt(dx*dx + dy*dy);
            const stretch = Math.min(speed * 0.04, 0.8);

            cursor.style.left = `${mouseX}px`;
            cursor.style.top = `${mouseY}px`;
            cursor.style.transform = `translate(-50%, -50%) scale(${1 + stretch}, ${1 - stretch * 0.4})`;
        });

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('nav-blur', 'py-4');
                nav.classList.remove('py-10');
            } else {
                nav.classList.remove('nav-blur', 'py-4');
                nav.classList.add('py-10');
            }
        });

        window.addEventListener('mousedown', (e) => {
            createBurst(e.clientX, e.clientY);
            playSound(220 + Math.random() * 100);
        });

        // --- Navigation ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            playSound(440, 0.2);
        }

        // --- Init Portfolio ---
        const grid = document.getElementById('portfolio-grid');
        for (let i = 1; i <= 9; i++) {
            grid.innerHTML += `
                <div class="project-card aspect-[4/5] bg-zinc-900 overflow-hidden rounded-3xl relative group border border-white/5">
                    <div class="absolute inset-0 bg-blue-600/20 opacity-0 group-hover:opacity-100 transition-opacity z-10"></div>
                    <div class="absolute bottom-8 left-8 z-20 opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0">
                        <span class="text-[10px] font-bold tracking-widest text-blue-400">PROJECT_0${i}</span>
                    </div>
                </div>`;
        }

        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
